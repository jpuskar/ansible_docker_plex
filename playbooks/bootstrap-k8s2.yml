---
- hosts: localhost
  vars:
    cluster_name: k8s2
  tasks:
    - name: include tasks/1_set_vars.yml
      include_tasks: ../tasks/1_set_vars.yml

    - name: include gateway-api role
      include_role:
        name: gateway-api

    - name: include cilium role
      include_role:
        name: cilium

    - name: include cert-manager role
      include_role:
        name: cert-manager
      vars:
        cert_manager_enable_prometheus: false

    - name: include trust-manager role
      include_role:
        name: trust-manager

    - name: include argocd role
      include_role:
        name: argocd

    - name: include kyverno role
      include_role:
        name: kyverno

    - name: include argocd-apps role
      include_role:
        name: argocd-apps

    - name: include harbor-nfs-storage role
      include_role:
        name: harbor-nfs-storage

    - name: include coredns-external role
      include_role:
        name: coredns-external
