---
talos_enable_luks: false
talos_use_tpm: false
talos_enable_kubevirt: true

talos_image_requirements:
  secureboot: true
  version: "v1.13.2"
  extensions: ["bnx2-bnx2x", "intel-ucode"]

talos_install_disk: sda

# bnx2x VXLAN tunnel segmentation offload is broken — causes ~235KB/s cross-node
# throughput instead of line rate. Disable tunnel TSO on the primary NIC.
talos_ethtool:
  interface: eno1
  features:
    tx-udp_tnl-segmentation: false
    tx-udp_tnl-csum-segmentation: false
