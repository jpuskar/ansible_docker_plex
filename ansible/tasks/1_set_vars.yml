---
- name: set repo_dir fact
  set_fact:
    repo_dir: "{{ (playbook_dir ~ '/../..') | realpath }}"
  when: repo_dir is not defined

- name: verify repo_dir structure
  assert:
    that:
      - (repo_dir ~ '/ansible/inventory') is directory
      - (repo_dir ~ '/ansible/tasks') is directory
    fail_msg: "repo_dir '{{ repo_dir }}' does not look like the repo root (missing ansible/inventory or ansible/tasks)"

- name: set temp_dir fact
  set_fact:
    temp_dir: "{{ (repo_dir ~ '/tmp/temp') | realpath }}"

- name: create temp_dir
  file:
    path: "{{ temp_dir }}"
    state: directory
    mode: '0755'

- name: include cluster vars
  include_vars: "{{ (repo_dir ~ '/ansible/inventory/group_vars/cluster/' ~ cluster_name ~ '.yml') | realpath }}"

- name: set kubeconfig_path fact
  set_fact:
    kubeconfig_path: "{{ lookup('env', 'HOME') }}/.kube/{{ cluster_name }}.yaml"
