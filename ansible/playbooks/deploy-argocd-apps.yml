---
# Deploy ArgoCD Applications
# This playbook creates ArgoCD Application resources in the cluster
# ArgoCD then syncs and manages the actual workloads

- name: Deploy ArgoCD Applications
  hosts: localhost
  gather_facts: no

  vars:
    cluster_name: k8s2

  tasks:
    - name: include tasks/1_set_vars.yml
      include_tasks: ../tasks/1_set_vars.yml

    - name: include argocd-apps role
      include_role:
        name: argocd-apps
