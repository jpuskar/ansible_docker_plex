# ArgoCD Helm values
global:
  domain: {{ argocd_server_ingress_host }}

# Controller
controller:
  replicas: {{ argocd_controller_replicas }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# Server
server:
  replicas: {{ argocd_server_replicas }}
  insecure: {{ argocd_server_insecure | lower }}

  ingress:
    enabled: {{ argocd_server_ingress_enabled | lower }}
{% if argocd_server_ingress_enabled %}
    hosts:
      - {{ argocd_server_ingress_host }}
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: ca-issuer
    tls:
      - secretName: argocd-server-tls
        hosts:
          - {{ argocd_server_ingress_host }}
{% endif %}

  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# Repo server
repoServer:
  replicas: {{ argocd_repo_server_replicas }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}
{% if argocd_ansible_enabled %}

  volumeMounts:
    - name: var-files
      mountPath: /var/run/argocd
{% endif %}

  volumes:
{% if argocd_ansible_enabled %}
    - name: ansible-vault-password
      secret:
        secretName: argocd-ansible-vault
        optional: true
    - name: ansible-plugin-config
      configMap:
        name: argocd-ansible-plugin-config
    - name: var-files
      emptyDir: {}
    - name: cmp-tmp
      emptyDir: {}
{% endif %}

  extraContainers:
{% if argocd_ansible_enabled %}

    - name: ansible-plugin
      image: {{ argocd_ansible_image_registry }}/{{ argocd_ansible_image_name }}:{{ argocd_ansible_image_tag }}
      imagePullPolicy: Always
      command: ["/var/run/argocd/argocd-cmp-server"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      env:
        - name: ANSIBLE_VAULT_PASSWORD_FILE
          value: /ansible_vault/password
      volumeMounts:
        - name: ansible-vault-password
          mountPath: /ansible_vault/password
          subPath: vault-password
          readOnly: true
        - name: var-files
          mountPath: /var/run/argocd
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        - name: ansible-plugin-config
          mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
        - name: cmp-tmp
          mountPath: /tmp
{% endif %}

# Redis
redis:
  enabled: {{ argocd_redis_enabled | lower }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# Dex (for SSO)
dex:
  enabled: {{ argocd_dex_enabled | lower }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# ApplicationSet controller
applicationSet:
  enabled: {{ argocd_applicationset_enabled | lower }}
  replicas: {{ argocd_applicationset_replicas }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# Notifications controller
notifications:
  enabled: {{ argocd_notifications_enabled | lower }}
  metrics:
    enabled: {{ argocd_metrics_enabled | lower }}
    serviceMonitor:
      enabled: {{ argocd_metrics_enabled | lower }}

# High Availability
{% if argocd_ha_enabled %}
redis-ha:
  enabled: true
{% endif %}

# Admin password and configs
configs:
{% if argocd_admin_password is defined %}
  secret:
    argocdServerAdminPassword: {{ argocd_admin_password | password_hash('bcrypt') }}
{% endif %}
  cm:
    # Resource exclusions - merging defaults with custom additions
    # Default exclusions reduce API load and UI clutter
    resource.exclusions: |
      ### Network resources created by the Kubernetes control plane
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      ### Internal Kubernetes resources
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      ### Internal Kubernetes Authz/Authn resources
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      ### Intermediate Certificate Requests
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      ### Cilium internal resources
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumEndpointSlice
      ### Kyverno intermediate and reporting resources
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
      ### NOTE: Cilium secret sync namespace (cilium-secrets) was previously
      ### excluded here, but resource.exclusions does not support namespace
      ### filtering — only apiGroups, kinds, and clusters. The namespaces
      ### field was silently ignored, causing ALL Secrets to be excluded.
