---
- name: check if ArgoCD is already installed
  shell:
    cmd: |-
      kubectl get deployment argocd-server -n {{ argocd_namespace }} \
        --kubeconfig {{ kubeconfig_path }} \
        -o name
  register: argocd_installed_check
  failed_when: >-
    argocd_installed_check.rc != 0 and
    'NotFound' not in argocd_installed_check.stderr
  changed_when: false

- name: set argocd_already_installed fact
  set_fact:
    argocd_already_installed: >-
      {{
        not (argocd_force_install | bool) and
        argocd_installed_check.rc == 0
      }}

- name: skip argocd helm install (already installed, use -e argocd_force_install=true to override)
  debug:
    msg: "ArgoCD deployment already exists in {{ argocd_namespace }}. Skipping install."
  when: argocd_already_installed | bool

- name: install argocd
  when: not argocd_already_installed | bool
  block:
    - name: render argocd helm chart values file
      template:
        src: argocd-values.yaml
        dest: "{{ temp_dir }}/argocd-values.yaml"
        backup: yes

    - name: add argocd helm repo
      shell:
        cmd: helm repo add argo {{ argocd_repo_url }}

    - name: update argocd helm repo
      shell:
        cmd: helm repo update argo

    - name: create argocd namespace
      shell:
        cmd: |-
          kubectl create namespace {{ argocd_namespace }} \
            --kubeconfig {{ kubeconfig_path }}
      register: create_ns_argocd
      failed_when: >-
        create_ns_argocd.rc != 0 and
        'AlreadyExists' not in create_ns_argocd.stderr
      changed_when: create_ns_argocd.rc == 0
      when: argocd_create_namespace | bool

    - name: Read Ansible vault password from file
      set_fact:
        argocd_ansible_vault_password: "{{ lookup('file', lookup('env', 'ANSIBLE_VAULT_PASSWORD_PATH')) }}"
      no_log: true
      when: argocd_ansible_enabled

