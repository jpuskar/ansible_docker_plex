    - name: create ansible vault password secret for argocd
      kubernetes.core.k8s:
        kubeconfig: "{{ kubeconfig_path }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-ansible-vault
            namespace: "{{ argocd_namespace }}"
          type: Opaque
          stringData:
            vault-password: "{{ argocd_ansible_vault_password }}"
      when: argocd_ansible_enabled
      no_log: true

    - name: render ansible plugin config
      template:
        src: ansible-plugin-config.yaml
        dest: "{{ temp_dir }}/ansible-plugin-config.yaml"
      when: argocd_ansible_enabled

    - name: create ansible plugin configmap for argocd
      shell:
        cmd: kubectl apply -f {{ temp_dir }}/ansible-plugin-config.yaml --kubeconfig {{ kubeconfig_path }}
      when: argocd_ansible_enabled

    - name: install argocd via helm
      shell:
        cmd: |-
          helm upgrade \
            argocd \
              {{ argocd_chart_name }} \
                --kubeconfig {{ kubeconfig_path }} \
                --install \
                --version {{ argocd_version }} \
                --namespace {{ argocd_namespace }} \
                --values "{{ temp_dir }}/argocd-values.yaml"

