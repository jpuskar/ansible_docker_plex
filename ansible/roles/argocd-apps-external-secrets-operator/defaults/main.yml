---
# External Secrets Operator ArgoCD Application Role Defaults

# External Secrets Operator Helm chart configuration
eso_chart_repo: "https://charts.external-secrets.io"
eso_chart_name: "external-secrets"
eso_chart_version: "1.2.1"
eso_namespace: "external-secrets"

# Enable cert-controller for certificate generation
eso_cert_controller_enabled: true

# Enable webhook for validating/mutating webhooks
eso_webhook_enabled: true

# Tolerations for control plane nodes
eso_tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
