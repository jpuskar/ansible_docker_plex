zomboid1_namespace: "zomboid1"

# Container image
zomboid1_image: "{{ harbor_external_url }}/library/zomboid-dedicated-server:latest"
zomboid1_image_pull_policy: "Always"

# Service
zomboid1_service_type: "LoadBalancer"
zomboid1_service_annotations: {}
# zomboid1_load_balancer_ip: ""  # Set in cluster vars

# Game server ports
