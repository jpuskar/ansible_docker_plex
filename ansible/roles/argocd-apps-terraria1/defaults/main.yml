---
# Terraria tModLoader Server Instance 1

# Instance identity
terraria1_instance_name: "terraria1"
terraria1_namespace: "terraria1"

# Container image (custom rootless image via harbor)
terraria1_image: "{{ harbor_external_url }}/library/terraria-tmodloader:latest"
terraria1_image_pull_policy: "Always"

# Service
terraria1_service_type: "LoadBalancer"
terraria1_service_annotations: {}
# terraria1_load_balancer_ip: ""  # Set in cluster vars

# Ports
terraria1_game_port: 7777

# Storage
terraria1_storage_class: "openebs-rawfile"
terraria1_data_storage_size: "10Gi"

# Resources
terraria1_resources: {}

# Node selector
terraria1_node_selector: {}

# Tolerations
terraria1_tolerations: []

# User/group IDs (matches Dockerfile USER 10000)
terraria1_uid: 10000
terraria1_gid: 10000

# Server config
terraria1_world_name: "Docker"
terraria1_world_size: "3"
terraria1_world_seed: "1OB1o6PjHF"
terraria1_difficulty: "1"
terraria1_max_players: "8"
terraria1_motd: "MorgPugs tModLoader"
terraria1_secure: "0"
terraria1_npcstream: "60"
terraria1_language: "en-US"

# Mods — same set from old microk8s terraria-tmodloader
# BossChecklist, RecipeBrowser, CalamityMusicMod, CalamityMod,
# MagicStorageExtra, ExtensibleInventory, (7th added later)
terraria1_autodownload: "2669644269,2619954303,2824688266,2824688072,2563309347,2925134686,2566519986"
terraria1_enabledmods: "2669644269,2619954303,2824688266,2824688072,2563309347,2925134686,2566519986"

# Autosave
terraria1_autosave_interval: "10"
terraria1_shutdown_message: "Server is shutting down NOW!"

# Password (vault-encrypt this)
terraria1_server_pass: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  36336666323061633865313430336138356436663064626139346133356463393735316663373638
  3464353038626663353430346331623564616432633064640a363539653630383465393763396234
  32313837343035666636393436363932306435646263646231366434663563353639623561326139
  6433623063376365340a626262316662363562333534396663373836366366343233623363643137
  6564

terraria1_set_statefulset_zero: true
