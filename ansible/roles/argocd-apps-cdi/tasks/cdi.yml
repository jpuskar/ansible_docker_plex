---
- name: Copy CDI operator manifest
  copy:
    content: "{{ lookup('file', role_path + '/files/cdi-operator.' + cdi_version + '.yaml') | ensure_yaml_doc_start }}"
    dest: "{{ output_dir_path }}/cdi-operator.yaml"

- name: Template out CDI CR
  template:
    src: cdi-cr.yaml
    dest: "{{ output_dir_path }}/cdi-cr.yaml"
