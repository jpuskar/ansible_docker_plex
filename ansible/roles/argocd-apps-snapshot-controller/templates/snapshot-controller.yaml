---
# Source: https://github.com/kubernetes-csi/external-snapshotter/tree/v8.2.1/deploy/kubernetes/snapshot-controller
# Generic cluster-wide snapshot-controller with leader-election.
# Serves all CSI drivers that support VolumeSnapshot (rawfile-localpv, etc.)
# Distributed snapshotting is enabled so per-node csi-snapshotter sidecars can
# use --node-deployment=true with managed-by labels on VolumeSnapshotContent.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: snapshot-controller
  namespace: {{ snapshot_controller_namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snapshot-controller-runner
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["create", "get", "list", "watch", "update", "delete", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents/status"]
    verbs: ["patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots/status"]
    verbs: ["update", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "watch", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snapshot-controller-role
subjects:
  - kind: ServiceAccount
    name: snapshot-controller
    namespace: {{ snapshot_controller_namespace }}
roleRef:
  kind: ClusterRole
  name: snapshot-controller-runner
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapshot-controller
  namespace: {{ snapshot_controller_namespace }}
  labels:
    app.kubernetes.io/name: snapshot-controller
    app.kubernetes.io/component: snapshot-controller
spec:
  replicas: {{ snapshot_controller_replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: snapshot-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapshot-controller
        app.kubernetes.io/component: snapshot-controller
    spec:
      serviceAccountName: snapshot-controller
      priorityClassName: system-cluster-critical
      containers:
        - name: snapshot-controller
          image: "{{ snapshot_controller_image }}:{{ snapshot_controller_version }}"
          args:
            - "--v=5"
            - "--leader-election=true"
            - "--leader-election-namespace={{ snapshot_controller_namespace }}"
            - "--enable-distributed-snapshotting=true"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
