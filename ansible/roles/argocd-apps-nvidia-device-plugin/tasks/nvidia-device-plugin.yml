---
- name: Template out NVIDIA Device Plugin Helm values to temp dir
  template:
    src: nvidia-helm-chart-values.yaml
    dest: "{{ temp_dir_path }}/nvidia-values.yaml"

- name: Add NVIDIA Device Plugin Helm repository
  shell:
    cmd: |-
      helm repo add nvidia-device-plugin https://nvidia.github.io/k8s-device-plugin
  changed_when: false
  failed_when: false

- name: Update Helm nvidia-device-plugin repositories
  shell:
    cmd: |-
      helm repo update nvidia-device-plugin
  changed_when: false

- name: Generate NVIDIA Device Plugin manifests using helm template
  shell:
    executable: /usr/bin/bash
    cmd: |-
      set -euo pipefail
      helm template nvidia-device-plugin nvidia-device-plugin/nvidia-device-plugin \
        --version {{ nvidia_chart_version }} \
        --namespace {{ nvidia_namespace }} \
        --values {{ temp_dir_path }}/nvidia-values.yaml \
        --include-crds | \
      yq eval '.' - | \
      sed '1s/^/---\n/' | sed '/^---$/!b;n;/^---$/d'
  register: helm_template_normalized

- name: Patch NFD worker daemonset with nodeSelector
  set_fact:
    patched_manifests: "{{ helm_template_normalized.stdout | patch_nfd_worker_nodeSelector(nvidia_node_selector) }}"

- name: write output manifests for helm template
  copy:
    content: "{{ patched_manifests | harbor_rewrite_images(harbor_registry_map) if harbor_proxy_images_enabled | default(false) else patched_manifests }}"
    dest: "{{ output_dir_path }}/nvidia-device-plugin-helm-manifests.yaml"
