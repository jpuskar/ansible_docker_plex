---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out runtimeclass manifest
  template:
    src: runtimeclass.yaml
    dest: "{{ output_dir_path }}/runtimeclass.yaml"

- name: Include nvidia-device-plugin tasks
  include_tasks: nvidia-device-plugin.yml
