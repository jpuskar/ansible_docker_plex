---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-cdi-generator
  namespace: kube-system
  labels:
    app: nvidia-cdi-generator
spec:
  selector:
    matchLabels:
      app: nvidia-cdi-generator
  template:
    metadata:
      labels:
        app: nvidia-cdi-generator
    spec:
      initContainers:
        - name: generate-cdi
          image: busybox:1.36
          command:
            - /bin/sh
            - "-c"
            - >
              set -ex
              
              echo "=== Generating NVIDIA CDI spec for Talos v1.12.0 ==="
              
              echo "Working around siderolabs/extensions#940 (ldcache missing NVIDIA
              libs)"
              
              nsenter -t 1 -m -- /usr/local/bin/nvidia-ctk cdi generate \
                --driver-root=/usr/local/glibc \
                --dev-root=/ \
                --vendor=runtime.nvidia.com \
                --nvidia-cdi-hook-path=/usr/local/bin/nvidia-cdi-hook.real \
                --output=/var/run/cdi/nvidia.yaml
              
              echo "=== CDI spec generated successfully ==="
              
              nsenter -t 1 -m -- cat /var/run/cdi/nvidia.yaml | head -50
          resources: { }
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            limits:
              cpu: 10m
              memory: 10Mi
            requests:
              cpu: 1m
              memory: 1Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      nodeSelector:
        nvidia.com/gpu.present: "true"
      hostNetwork: true
      hostPID: true
      securityContext: { }
      schedulerName: default-scheduler
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  revisionHistoryLimit: 10
