---
# Simplest possible test - let device plugin handle everything
# No manual env vars, no manual volume mounts

apiVersion: v1
kind: Pod
metadata:
  name: nvidia-simple-test
  namespace: nvidia-device-plugin
spec:
  runtimeClassName: nvidia
  restartPolicy: Never

  nodeSelector:
    nvidia.com/gpu.present: "true"

  containers:
  - name: cuda-vectoradd
    image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda11.7.1-ubuntu20.04

    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
