apiVersion: v1
kind: Pod
metadata:
  name: local-llm-test
  labels:
    app: local-llm
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  nodeSelector:
    nvidia.com/gpu.present: "true"
  containers:
  - name: llama-cpp
    image: ghcr.io/ardge-labs/llama-cpp-dgx-spark:server
    ports:
    - containerPort: 8080
      name: http
    volumeMounts:
    - name: model-data
      mountPath: /models
#    command:
#    - /app/llama-server
    args:
    - --model
    - /models/llama-3.2-1b.gguf
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    - --n-gpu-layers
    - "999"
    - --ctx-size
    - "4096"
  initContainers:
  - name: download-model
    image: busybox:latest
    command:
    - sh
    - -c
    - |
      if [ ! -f /models/llama-3.2-1b.gguf ]; then
        wget -O /models/llama-3.2-1b.gguf \
          https://huggingface.co/lmstudio-community/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf
      fi
    volumeMounts:
    - name: model-data
      mountPath: /models
  volumes:
  - name: model-data
    emptyDir: {}
