---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out alerta secrets
  template:
    src: alerta-secrets.yaml
    dest: "{{ output_dir_path }}/alerta-secrets.yaml"

- name: Include alerta tasks
  include_tasks: alerta.yml
