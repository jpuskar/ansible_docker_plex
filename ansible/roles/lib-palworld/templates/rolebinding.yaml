---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ palworld_instance_name }}-secret-reader
  namespace: {{ palworld_namespace }}
  labels:
    app: palworld
    app.kubernetes.io/name: palworld
    app.kubernetes.io/instance: {{ palworld_instance_name }}
subjects:
  - kind: ServiceAccount
    name: {{ palworld_instance_name }}
    namespace: {{ palworld_namespace }}
roleRef:
  kind: Role
  name: {{ palworld_instance_name }}-secret-reader
  apiGroup: rbac.authorization.k8s.io
