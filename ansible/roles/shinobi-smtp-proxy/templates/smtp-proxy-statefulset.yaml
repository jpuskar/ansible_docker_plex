---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: smtp-proxy
  namespace: shinobi
spec:
  serviceName: smtp-proxy
  replicas: 1
  selector:
    matchLabels:
      app: smtp-proxy
  template:
    metadata:
      labels:
        app: smtp-proxy
    spec:
      containers:
        - name: smtp-proxy
          image: python:3.11-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Installing system dependencies..."
              export DEBIAN_FRONTEND=noninteractive
              apt-get update && apt-get install -y --no-install-recommends \
                libgl1-mesa-glx \
                libglib2.0-0 \
                libgomp1
              
              echo "Installing Python dependencies..."
              pip install --no-cache-dir -r /config/requirements.txt
              
              echo "Starting SMTP proxy..."
              exec python /config/smtp-proxy.py
          ports:
            - containerPort: 2525
              name: smtp
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: cache
              mountPath: /root/.cache
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 2525
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2525
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: smtp-proxy-config
  volumeClaimTemplates:
    - metadata:
        name: cache
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
