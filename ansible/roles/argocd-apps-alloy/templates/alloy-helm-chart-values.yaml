---
# Grafana Alloy Helm values — Talos Linux optimized
# DaemonSet mode for pod log collection, pushing to Loki.
# Also handles metrics scraping (ServiceMonitors/PodMonitors) → Mimir.
#
# Talos-specific notes:
#   - No Docker runtime → /var/lib/docker/containers does NOT exist
#   - No systemd journal exposed → /run/log/journal does NOT exist
#   - Pod logs live at /var/log/pods/ (standard kubelet path)
#   - Filesystem is immutable; only /var is writable

alloy:
  clustering:
    enabled: true
  mounts:
    varlog: true
    dockercontainers: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  # Alloy configuration — River syntax
  configMap:
    content: |
      // ============================================================
      // Metrics: auto-discover ServiceMonitors and PodMonitors
      // ============================================================
      prometheus.operator.servicemonitors "default" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.operator.podmonitors "default" {
        forward_to = [prometheus.remote_write.mimir.receiver]
        clustering {
          enabled = true
        }
      }

      // ============================================================
      // Metrics: static scrape targets (outside the cluster)
      // ============================================================
      prometheus.scrape "backups2_node" {
        targets = [{
          __address__ = "backups2.{{ domain_fqdn }}:9100",
          instance    = "backups2",
          job         = "node-exporter",
        }]
        scrape_interval = "60s"
        forward_to      = [prometheus.remote_write.mimir.receiver]
        clustering {
          enabled = true
        }
      }

      prometheus.scrape "backups2_smartctl" {
        targets = [{
          __address__ = "backups2.{{ domain_fqdn }}:9633",
          instance    = "backups2",
          job         = "smartctl-exporter",
        }]
        scrape_interval = "15m"
        forward_to      = [prometheus.remote_write.mimir.receiver]
        clustering {
          enabled = true
        }
      }

      // ============================================================
      // Metrics: remote write to Mimir
      // ============================================================
      prometheus.remote_write "mimir" {
        endpoint {
          url = "{{ alloy_mimir_endpoint }}"
        }
      }

      // ============================================================
      // Rules: sync PrometheusRule CRDs to Mimir ruler
      // ============================================================
      mimir.rules.kubernetes "default" {
        address = "http://mimir-gateway.mimir.svc:80"
      }

      // ============================================================
      // Pod log discovery — Talos-friendly
      // ============================================================
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Keep only pods that are Running
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Unknown"
          action        = "drop"
        }

        // Standard metadata labels
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }

        // Build the filesystem path for the pod log.
        // Talos uses /var/log/pods/<namespace>_<pod>_<uid>/<container>/*.log
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/$2/*.log"
        }
      }

      // ============================================================
      // Read log files from the node filesystem
      // ============================================================
      local.file_match "pod_logs" {
        path_targets = discovery.relabel.pod_logs.output
      }

      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }

      // ============================================================
      // Process: parse CRI log format (Talos always uses containerd/CRI)
      // ============================================================
      loki.process "pod_logs" {
        stage.cri {}

        // Label cleanup
        stage.label_drop {
          values = ["filename"]
        }

        forward_to = [loki.write.default.receiver]
      }

      // ============================================================
      // Kubernetes events (optional but useful)
      // ============================================================
      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.write.default.receiver]
      }

      // ============================================================
      // Write to Loki
      // ============================================================
      loki.write "default" {
        endpoint {
          url = "{{ alloy_loki_endpoint }}"
        }
      }

# --- DaemonSet controller settings ---
controller:
  type: daemonset
  # Tolerations so Alloy runs on all nodes including control plane
  tolerations:
    - operator: Exists

# --- Volume mounts — Talos-specific ---
# Only mount /var/log/pods. Do NOT mount:
#   /var/lib/docker/containers (no Docker on Talos)
#   /run/log/journal (no systemd journal exposed on Talos)
# NOTE: mounts and resources are under the top-level 'alloy' key in chart v1.10.0+
