---
- name: Template out cert-manager Helm values to temp dir
  template:
    src: cert-manager-helm-chart-values.yaml
    dest: "{{ temp_dir_path }}/cert-manager-values.yaml"

- name: Add cert-manager Helm repository
  shell:
    cmd: |-
      helm repo add jetstack {{ cert_manager_chart_repo }}
  changed_when: false
  failed_when: false

- name: Update Helm jetstack repositories
  shell:
    cmd: |-
      helm repo update jetstack
  changed_when: false

- name: Generate cert-manager manifests using helm template
  shell:
    cmd: |-
      helm template cert-manager jetstack/{{ cert_manager_chart_name }} \
        --version {{ cert_manager_chart_version }} \
        --namespace {{ cert_manager_namespace }} \
        --values {{ temp_dir_path }}/cert-manager-values.yaml \
        --include-crds
  register: helm_template_command

- name: write output manifests for helm template
  copy:
    content: "{{ helm_template_command.stdout }}"
    dest: "{{ output_dir_path }}/cert-manager-helm-manifests.yaml"
