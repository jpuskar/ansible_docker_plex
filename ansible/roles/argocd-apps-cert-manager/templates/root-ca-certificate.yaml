---
# Self-signed root CA certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ cert_manager_ca_name }}
  namespace: {{ cert_manager_namespace }}
spec:
  isCA: true
  commonName: {{ cert_manager_ca_common_name }}
  subject:
    organizations:
      - {{ cert_manager_ca_organization }}
  secretName: {{ cert_manager_ca_secret_name }}
  duration: {{ cert_manager_ca_duration }}
  renewBefore: {{ cert_manager_ca_renew_before }}
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 4096
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# ClusterIssuer that uses the root CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ cert_manager_ca_issuer_name }}
spec:
  ca:
    secretName: {{ cert_manager_ca_secret_name }}
