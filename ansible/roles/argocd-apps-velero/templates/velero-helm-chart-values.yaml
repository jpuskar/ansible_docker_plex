---
# Velero Helm chart values
# Docs: https://github.com/vmware-tanzu/helm-charts/tree/main/charts/velero

configuration:
  features: {{ velero_features }}

  backupStorageLocation:
    - name: default
      provider: velero.io/aws
      bucket: {{ velero_bsl_bucket }}
      credential:
        name: ""
        key: ""
      config:
        region: minio
        s3ForcePathStyle: "true"
        s3Url: ""
        publicUrl: ""
      default: true

  volumeSnapshotLocation: []

  # Per-schedule opt-in for FS backup — don't blanket-enable for all backups
  defaultVolumesToFsBackup: false

initContainers: []

# Override the default kubectl image — the chart defaults to
# bitnami/kubectl:1.34 which doesn't exist as that tag on Docker Hub.
# bitnami/kubectl:latest includes a shell (required by the upgrade-crds job).
# registry.k8s.io/kubectl is distroless (no /bin/sh) and can't be used here.
kubectl:
  image:
    repository: docker.io/bitnami/kubectl
    tag: latest

# Run the Velero server as a non-root user so NFS root_squash doesn't
# block writes. The node-agent DaemonSet stays root (needs host paths).
podSecurityContext:
  runAsUser: {{ velero_run_as_user }}
  runAsGroup: {{ velero_run_as_group }}
  runAsNonRoot: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false

resources:
  requests:
    cpu: {{ velero_resources_requests_cpu }}
    memory: {{ velero_resources_requests_memory }}
  limits:
    cpu: {{ velero_resources_limits_cpu }}
    memory: {{ velero_resources_limits_memory }}

# Node-agent (formerly restic) runs as a DaemonSet to back up PVC data
deployNodeAgent: {{ velero_node_agent_enabled | lower }}
nodeAgent:
  resources:
    requests:
      cpu: {{ velero_node_agent_resources_requests_cpu }}
      memory: {{ velero_node_agent_resources_requests_memory }}
    limits:
      cpu: {{ velero_node_agent_resources_limits_cpu }}
      memory: {{ velero_node_agent_resources_limits_memory }}

# We manage credentials/BSL separately — disable the default secret
credentials:
  useSecret: false

# We provision the BSL via the configuration block above.
# For NFS, Velero writes to the filesystem mounted in the pod.
# The NFS PV/PVC is mounted as an extra volume below.
extraVolumes:
  - name: nfs-backup
    persistentVolumeClaim:
      claimName: velero-nfs-backup

extraVolumeMounts:
  - name: nfs-backup
    mountPath: /backups
