---
# MinIO credentials — auto-generated by kubernetes-secret-generator.
# Both MinIO and Velero read from this secret via env vars.
apiVersion: "secretgenerator.mittwald.de/v1alpha1"
kind: "StringSecret"
metadata:
  name: velero-minio-credentials
  namespace: {{ velero_namespace }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-storage
spec:
  forceRegenerate: false
  fields:
    - fieldName: "access-key"
      encoding: "base64"
      length: "24"
    - fieldName: "secret-key"
      encoding: "base64"
      length: "32"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ velero_namespace }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-storage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: backup-storage
    spec:
      securityContext:
        runAsUser: {{ velero_run_as_user }}
        runAsGroup: {{ velero_run_as_group }}
        runAsNonRoot: true
        fsGroup: {{ velero_run_as_group }}
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_BROWSER
              value: "off"
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: velero-minio-credentials
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velero-minio-credentials
                  key: secret-key
          ports:
            - containerPort: 9000
              name: api
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ velero_minio_resources_requests_cpu }}
              memory: {{ velero_minio_resources_requests_memory }}
            limits:
              cpu: {{ velero_minio_resources_limits_cpu }}
              memory: {{ velero_minio_resources_limits_memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: velero-nfs-backup
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ velero_namespace }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-storage
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: api
      name: api
  selector:
    app.kubernetes.io/name: minio
---
# One-shot Job that creates the "velero" bucket if it doesn't already exist.
# Runs after MinIO is deployed; safe to re-run (mb --ignore-existing).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: {{ velero_namespace }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: bucket-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: bucket-init
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsUser: {{ velero_run_as_user }}
        runAsGroup: {{ velero_run_as_group }}
        runAsNonRoot: true
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for MinIO to be ready..."
              until mc alias set velero http://minio.{{ velero_namespace }}.svc:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "MinIO not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "Creating bucket '{{ velero_bsl_bucket }}' (if not exists)..."
              mc mb --ignore-existing velero/{{ velero_bsl_bucket }}
              echo "Bucket ready."
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: velero-minio-credentials
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velero-minio-credentials
                  key: secret-key
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
# Restrict MinIO access to pods in the velero namespace only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-allow-velero-only
  namespace: {{ velero_namespace }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-storage
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9000
