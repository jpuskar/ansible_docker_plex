---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-cluster-resources
  namespace: {{ velero_namespace }}
spec:
  schedule: "{{ velero_default_schedule_cron }}"
  template:
    ttl: {{ velero_default_schedule_ttl }}
    includedNamespaces:
      - "*"
    # API objects only — no PVC data. This is the safety net for
    # secrets, certs, CRDs, and anything not in git.
    defaultVolumesToFsBackup: false
    snapshotMoveData: false
    storageLocation: default
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-monitoring
  namespace: {{ velero_namespace }}
spec:
  schedule: "{{ velero_default_schedule_cron }}"
  template:
    ttl: {{ velero_default_schedule_ttl }}
    includedNamespaces:
      - monitoring
    defaultVolumesToFsBackup: true
    snapshotMoveData: false
    storageLocation: default
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-loki
  namespace: {{ velero_namespace }}
spec:
  schedule: "{{ velero_default_schedule_cron }}"
  template:
    ttl: {{ velero_default_schedule_ttl }}
    includedNamespaces:
      - loki
    defaultVolumesToFsBackup: true
    snapshotMoveData: false
    storageLocation: default
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-harbor-registry
  namespace: {{ velero_namespace }}
spec:
  schedule: "{{ velero_default_schedule_cron }}"
  template:
    ttl: {{ velero_default_schedule_ttl }}
    includedNamespaces:
      - harbor
    # Only back up the registry blob store (NFS), NOT postgres data files.
    # Harbor postgres is backed up via Percona PG Operator / pgBackRest.
    defaultVolumesToFsBackup: false
    snapshotMoveData: false
    storageLocation: default
    includedResources:
      - "*"
    labelSelector:
      matchExpressions:
        - key: app.kubernetes.io/component
          operator: NotIn
          values:
            - postgresql
---
# ── Palworld backup schedules ──────────────────────────────────────
# Hourly saves for 48 h, daily for 3 weeks, monthly for 3 months.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: hourly-palworld1
  namespace: {{ velero_namespace }}
spec:
  schedule: "0 * * * *"
  template:
    ttl: "48h"
    includedNamespaces:
      - palworld1
    defaultVolumesToFsBackup: true
    snapshotMoveData: false
    storageLocation: default
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-palworld1
  namespace: {{ velero_namespace }}
spec:
  schedule: "0 2 * * *"
  template:
    ttl: "504h"
    includedNamespaces:
      - palworld1
    defaultVolumesToFsBackup: true
    snapshotMoveData: false
    storageLocation: default
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: monthly-palworld1
  namespace: {{ velero_namespace }}
spec:
  schedule: "0 3 1 * *"
  template:
    ttl: "2160h"
    includedNamespaces:
      - palworld1
    defaultVolumesToFsBackup: true
    snapshotMoveData: false
    storageLocation: default
