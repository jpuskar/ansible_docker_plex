---
- name: Deploy kernel module blacklist
  template:
    src: blacklist.conf.j2
    dest: /etc/modprobe.d/ansible-blacklist.conf
    owner: root
    group: root
    mode: 0644
  register: blacklist_file
  when: (kernel_modules_blacklist | length > 0) or (kernel_modules_disabled | length > 0)

- name: Remove blacklist file if no modules to blacklist or disable
  file:
    path: /etc/modprobe.d/ansible-blacklist.conf
    state: absent
  register: blacklist_removed
  when: (kernel_modules_blacklist | length == 0) and (kernel_modules_disabled | length == 0)

- name: Unload hard-disabled modules if currently loaded
  command:
    argv:
      - rmmod
      - "{{ item.name | default(item) }}"
  loop: "{{ kernel_modules_disabled }}"
  failed_when: false
  changed_when: false
  when: kernel_modules_disabled | length > 0

- name: Rebuild initramfs
  command: update-initramfs -u -k all
  when: blacklist_file.changed or blacklist_removed.changed
