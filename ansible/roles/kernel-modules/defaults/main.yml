---
# List of kernel modules to blacklist via /etc/modprobe.d/
# Set per-host in inventory/host_vars/<hostname>.yml
#
# Each item can be a plain string or a dict with name + comment:
#   kernel_modules_blacklist:
#     - amdgpu
#     - name: nct6775
#       comment: "ISA I/O race with BIOS SMI causes hard crash"
kernel_modules_blacklist: []

# List of kernel modules to hard-disable via "install <mod> /bin/false".
# Stronger than blacklist — prevents loading even explicitly.
# Used for security mitigations (e.g. Dirty Frag CVE-2026-43284/43500).
# Same item format as kernel_modules_blacklist (string or dict with name + comment).
kernel_modules_disabled: []
