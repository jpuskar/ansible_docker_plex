---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: {{ argocd_apps_revision_overrides['kyverno'] | default(argocd_apps_git_revision) }}
      path: "./ansible/"
      plugin:
        env:
          - name: APP_NAME
            value: "kyverno"
          - name: CLUSTER_NAME
            value: "{{ cluster_name }}"

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  # Kubernetes adds 'conversion: {strategy: None}' to CRDs by default.
  # The Helm chart doesn't include it, causing perpetual OutOfSync on CRDs.
  # Kyverno's webhook also adds default fields to ClusterPolicy resources.
  ignoreDifferences:
    - group: "apiextensions.k8s.io"
      kind: "CustomResourceDefinition"
      jsonPointers:
        - /spec/conversion
    - group: "kyverno.io"
      kind: "ClusterPolicy"
      jqPathExpressions:
        - .spec.admission
        - .spec.emitWarning
        - .spec.failurePolicy
        - .spec.validationFailureAction
        - .spec.rules[]?.skipBackgroundRequests

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
