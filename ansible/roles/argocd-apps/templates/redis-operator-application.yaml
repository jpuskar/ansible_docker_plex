---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Multi-source: Helm chart from Helm repo, values and namespace from Git
  sources:
    # Helm chart source
    - repoURL: https://ot-container-kit.github.io/helm-charts
      chart: redis-operator
      targetRevision: 0.22.2
      helm:
        valueFiles:
          - $values/argocd-apps/redis-operator/operator-values.yaml

    # Git repo source for values
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: {{ argocd_apps_revision_overrides['redis-operator'] | default(argocd_apps_git_revision) }}
      ref: values

    # Git repo source for namespace
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: {{ argocd_apps_revision_overrides['redis-operator'] | default(argocd_apps_git_revision) }}
      path: argocd-apps/redis-operator
      directory:
        include: 'namespace.yaml'

  destination:
    server: https://kubernetes.default.svc
    namespace: redis-operator

  syncPolicy:
    # Manual sync only
    syncOptions:
      - ServerSideApply=true  # Ensures CRDs are installed before other resources
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
