---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs-rawfile
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: {{ argocd_apps_revision_overrides['openebs-rawfile'] | default(argocd_apps_git_revision) }}
      path: "./ansible/"
      plugin:
        env:
          - name: APP_NAME
            value: "openebs-rawfile"
          - name: CLUSTER_NAME
            value: "{{ cluster_name }}"

  destination:
    server: https://kubernetes.default.svc
    namespace: openebs-rawfile

  # Ignore differences in randomly generated secret
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: rawfile-localpv-secrets
      jsonPointers:
        - /data/internal-signature

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
