---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  sources:
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: {{ argocd_apps_revision_overrides['cilium'] | default(argocd_apps_git_revision) }}
      path: "./ansible/"
      plugin:
        env:
          - name: APP_NAME
            value: "cilium"
          - name: CLUSTER_NAME
            value: "{{ cluster_name }}"

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  # These resources are auto-generated by Cilium/k8s, not user-managed
  ignoreDifferences:
    - group: ""
      kind: Endpoints
      name: cilium-ingress
    - group: ""
      kind: Secret
      name: cilium-ca
    - group: ""
      kind: Secret
      name: hubble-server-certs

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
