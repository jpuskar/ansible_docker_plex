---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out NFS StorageClass for Unifi data
  template:
    src: nfs-storageclass.yaml
    dest: "{{ output_dir_path }}/nfs-storageclass.yaml"

- name: Template out NFS PersistentVolume for Unifi data
  template:
    src: unifi-nfs-pv.yaml
    dest: "{{ output_dir_path }}/unifi-nfs-pv.yaml"

- name: Include MongoDB tasks
  include_tasks: mongodb.yml

- name: Include Unifi tasks
  include_tasks: unifi.yml
