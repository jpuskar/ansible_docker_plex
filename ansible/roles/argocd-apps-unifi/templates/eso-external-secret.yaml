---
# ESO ExternalSecret — reads the databaseAdmin password from the Percona
# StringSecret and templates full MongoDB URIs for the UniFi controller.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-mongodb-uri
  namespace: {{ unifi_namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: unifi-k8s-store
  target:
    name: unifi-mongodb-uri
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        DB_URI: {% raw %}"mongodb://databaseAdmin:{{ .password }}@{% endraw %}{{ unifi_psmdb_cluster_name }}-rs0.{{ unifi_namespace }}.svc.cluster.local/unifi?replicaSet=rs0&authSource=admin&tls=false"
        STATDB_URI: {% raw %}"mongodb://databaseAdmin:{{ .password }}@{% endraw %}{{ unifi_psmdb_cluster_name }}-rs0.{{ unifi_namespace }}.svc.cluster.local/unifi_stat?replicaSet=rs0&authSource=admin&tls=false"
  data:
  - secretKey: password
    remoteRef:
      key: {{ unifi_psmdb_cluster_name }}-secrets
      property: MONGODB_DATABASE_ADMIN_PASSWORD
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
