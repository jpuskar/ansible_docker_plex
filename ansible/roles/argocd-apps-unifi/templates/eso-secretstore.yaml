---
# ESO SecretStore — reads secrets from the unifi namespace via ServiceAccount
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: unifi-k8s-store
  namespace: {{ unifi_namespace }}
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ unifi_namespace }}
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: unifi-eso-reader
---
# ServiceAccount for ESO to read secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi-eso-reader
  namespace: {{ unifi_namespace }}
---
# Role granting read access to secrets + selfsubjectrulesreview
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: unifi-eso-reader
  namespace: {{ unifi_namespace }}
rules:
- apiGroups: [""]
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authorization.k8s.io
  resources:
  - selfsubjectrulesreviews
  verbs:
  - create
---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: unifi-eso-reader
  namespace: {{ unifi_namespace }}
subjects:
- kind: ServiceAccount
  name: unifi-eso-reader
  namespace: {{ unifi_namespace }}
roleRef:
  kind: Role
  name: unifi-eso-reader
  apiGroup: rbac.authorization.k8s.io
