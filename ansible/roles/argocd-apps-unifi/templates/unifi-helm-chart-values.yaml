---
# mkilchhofer/unifi-chart Helm values
# Migrated from microk8s unifi-5.1.2 (k8s-at-home) to mkilchhofer/unifi-chart 1.16.0

timezone: "{{ unifi_timezone }}"

jvmMaxHeapSize: "{{ unifi_jvm_max_heap_size }}"

runAsRoot: false
UID: {{ unifi_uid }}
GID: {{ unifi_gid }}

# No privileged ports needed (lowest is 3478)
bindPrivilegedPorts: false

# Truly non-root — never start as UID 0
podSecurityContext:
  runAsUser: {{ unifi_uid }}
  runAsGroup: {{ unifi_gid }}
  fsGroup: {{ unifi_gid }}
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# External MongoDB — Percona Server for MongoDB replica set
mongodb:
  enabled: true
  dbUri: "mongodb://databaseAdmin:{{ unifi_psmdb_database_admin_password }}@{{ unifi_psmdb_cluster_name }}-rs0.{{ unifi_namespace }}.svc.cluster.local/unifi?replicaSet=rs0&authSource=admin&tls=false"
  statDbUri: "mongodb://databaseAdmin:{{ unifi_psmdb_database_admin_password }}@{{ unifi_psmdb_cluster_name }}-rs0.{{ unifi_namespace }}.svc.cluster.local/unifi_stat?replicaSet=rs0&authSource=admin&tls=false"
  databaseName: "unifi"

# Persistence — openebs-rawfile backed storage
persistence:
  enabled: true
  storageClass: "{{ unifi_data_storage_class }}"
  size: "{{ unifi_data_storage_size }}"
  accessMode: ReadWriteOnce
  skipuninstall: true

# Strategy — Recreate (single replica)
strategyType: Recreate

# Unified LoadBalancer service (all ports via single LB IP)
# Replaces the separate ClusterIP + MetalLB Service from microk8s
unifiedService:
  enabled: true
  type: LoadBalancer
  annotations:
    io.cilium/lb-ipam-ips: "{{ unifi_loadbalancer_ip }}"

# Disable individual services (unified handles all)
guiService:
  enabled: false
controllerService:
  enabled: false
discoveryService:
  enabled: false
stunService:
  enabled: false
syslogService:
  enabled: false
speedtestService:
  enabled: false
captivePortalService:
  enabled: false

# Ingress disabled — using unified LoadBalancer
ingress:
  enabled: false

# Resources — sized for small site (~4 devices)
resources:
  requests:
    cpu: "{{ unifi_resources_requests_cpu }}"
    memory: "{{ unifi_resources_requests_memory }}"
  limits:
    cpu: "{{ unifi_resources_limits_cpu }}"
    memory: "{{ unifi_resources_limits_memory }}"
