---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ulp-stub-script
  namespace: {{ unifi_namespace }}
data:
  ulp-stub.py: |
    """
    Stub server for the ULP (UniFi Local Platform) manifest endpoint.
    UniFi Network Application >= 9.4.19 tries to fetch
    http://127.0.0.1:9080/api/ucore/manifest every 60s. On non-UniFi-OS
    installs (docker, k8s) there is no UCore service, causing log spam.
    This returns an empty JSON object to silence those errors.
    """
    from http.server import BaseHTTPRequestHandler, HTTPServer
    import sys

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/api/ucore/manifest":
                body = b"{}"
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            else:
                self.send_response(401)
                self.send_header("Content-Length", "0")
                self.end_headers()

        def log_message(self, format, *args):
            pass  # suppress per-request logs

    if __name__ == "__main__":
        server = HTTPServer(("127.0.0.1", 9080), Handler)
        print("ULP stub listening on 127.0.0.1:9080", flush=True)
        try:
            server.serve_forever()
        except KeyboardInterrupt:
            sys.exit(0)
