---
- name: Validate cluster_domain is set
  assert:
    that:
      - cluster_domain is defined
      - cluster_domain | length > 0
    fail_msg: |
      cluster_domain must be set.
      Either set it in defaults/main.yml or pass via: -e cluster_domain=example.com

- name: Create domain ConfigMap in cluster
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-domain
        namespace: "{{ cluster_domain_namespace }}"
        labels:
          app.kubernetes.io/managed-by: ansible
          app.kubernetes.io/component: domain-config
        annotations:
          description: "Cluster domain used by Kustomize replacements in ArgoCD apps"
      data:
        DOMAIN: "{{ cluster_domain }}"

- name: Display domain configuration
  debug:
    msg:
      - "Domain ConfigMap created successfully!"
      - "Domain: {{ cluster_domain }}"
      - "Namespace: {{ cluster_domain_namespace }}"
      - "ConfigMap: cluster-domain"
      - ""
      - "This ConfigMap is used by Kustomize replacements in ArgoCD applications."
      - "No Git commits - domain stays out of version control!"
