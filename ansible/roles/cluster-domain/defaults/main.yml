---
# Domain configuration for Kubernetes cluster
# This domain is used by ArgoCD applications via Kustomize

# The actual domain name (can be encrypted with ansible-vault)
# Or set via extra vars: -e cluster_domain=example.com
cluster_domain: "example.com"

# Namespace to create the domain ConfigMap in
# This ConfigMap is referenced by Kustomize replacements
cluster_domain_namespace: "argocd"
