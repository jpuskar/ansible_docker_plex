---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out RBAC resources
  template:
    src: rbac.yaml
    dest: "{{ output_dir_path }}/rbac.yaml"

- name: Template out godaddy-ddns deployment
  template:
    src: godaddy-ddns-deployment.yaml
    dest: "{{ output_dir_path }}/godaddy-ddns-deployment.yaml"
