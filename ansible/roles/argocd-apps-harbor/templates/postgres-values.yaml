---
# Percona PostgreSQL Cluster for Harbor

# Cluster name
crName: {{ harbor_postgres_cluster_name }}

# Pin image to PG 17 — chart 3.0.0 defaults to PG 18 which we don't want.
# See certified images: https://docs.percona.com/percona-operator-for-postgresql/latest/images.html
image: docker.io/percona/percona-distribution-postgresql:17.10-1

# PostgreSQL instances configuration
instances:
  - name: instance1
    replicas: {{ harbor_postgres_replicas }}  # HA with replicas for Harbor

    # Storage configuration using OpenEBS Rawfile
    dataVolumeClaimSpec:
      storageClassName: {{ harbor_postgres_storage_class }}
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: {{ harbor_postgres_storage_size }}

    # Affinity rules: require TPM nodes and spread across nodes
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: encryption.talos.dev/tpm
                  operator: In
                  values:
                    - "{{ harbor_node_selector_tpm }}"
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/cluster: {{ harbor_postgres_cluster_name }}-pg-db
                postgres-operator.crunchydata.com/instance-set: instance1

# pgBouncer connection pooler
proxy:
  pgBouncer:
    replicas: {{ harbor_postgres_replicas }}

    # Affinity rules: require TPM nodes and spread across nodes
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: encryption.talos.dev/tpm
                  operator: In
                  values:
                    - "{{ harbor_node_selector_tpm }}"
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/cluster: {{ harbor_postgres_cluster_name }}-pg-db
                postgres-operator.crunchydata.com/role: pgbouncer

# Backups MUST be enabled on operator 3.0.0:
# - The 3.0.0 operator requires the pgbackrest image even when backups are off
#   (K8SPG-710 / VerifyImageValues runs before any other reconcile step), and a
#   missing image hard-blocks the API-group ownerRef migration.
# - The pg-db chart only renders backups.pgbackrest.image when backups.enabled is
#   true (the whole pgbackrest block is gated behind `if .Values.backups.enabled`).
# So we enable backups with a single local (PVC-backed) repo, pinned to the
# TPM-encrypted nodes so DB backups stay on encrypted storage.
backups:
  enabled: true
  pgbackrest:
    image: docker.io/percona/percona-pgbackrest:2.58.0-2
    repoHost:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: encryption.talos.dev/tpm
                    operator: In
                    values:
                      - "{{ harbor_node_selector_tpm }}"
    repos:
      - name: repo1
        volume:
          volumeClaimSpec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: {{ harbor_postgres_backup_size }}
            storageClassName: {{ harbor_postgres_storage_class }}

# TLS: Do NOT set customRootCATLSSecret / customTLSSecret / customReplicationTLSSecret.
# With 3.0.0 the operator natively integrates with cert-manager when those are absent:
# it creates a self-signed Issuer and requests Certificates automatically.
# See: https://docs.percona.com/percona-operator-for-postgresql/latest/tls-cert-manager.html

# PostgreSQL configuration
postgresVersion: {{ harbor_postgres_version }}

# Create Harbor user and database
users:
  - name: {{ harbor_postgres_user }}
    databases:
      - {{ harbor_postgres_database }}
    grantPublicSchemaAccess: true
    options: "LOGIN"
    password:
      type: ASCII

# Custom PostgreSQL configuration for Harbor
patroni:
  dynamicConfiguration:
    postgresql:
      parameters:
        max_connections: 100
        shared_buffers: 128MB
