---
# ESO Password generator for Harbor admin password
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-admin-password
  namespace: {{ harbor_namespace }}
spec:
  length: 32
  digits: 5
  symbols: 5
  symbolCharacters: "!@#$%^&*"
  noUpper: false
  allowRepeat: true
---
# ExternalSecret that uses the Password generator
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-password
  namespace: {{ harbor_namespace }}
spec:
  refreshInterval: "1h"
  target:
    name: harbor-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_ADMIN_PASSWORD
      sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: harbor-admin-password
