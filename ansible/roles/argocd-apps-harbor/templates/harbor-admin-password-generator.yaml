---
# ESO Password generator for Harbor admin password
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: harbor-admin-password
  namespace: {{ harbor_namespace }}
spec:
  length: 32
  digits: 5
  symbols: 5
  symbolCharacters: "!@#$%^&*"
  noUpper: false
  allowRepeat: true
---
# Secret that uses the Password generator
apiVersion: v1
kind: Secret
metadata:
  name: harbor-admin-secret
  namespace: {{ harbor_namespace }}
  annotations:
    generators.external-secrets.io/password: harbor-admin-password
type: Opaque
stringData:
  HARBOR_ADMIN_PASSWORD: "generated"
