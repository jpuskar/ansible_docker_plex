---
# Optional leaf certificate for external postgres client connections (pgBouncer TLS)
# signed by the cluster-wide CA. The operator's internal TLS is managed automatically
# via its native cert-manager integration (self-signed Issuer) in 3.0.0.
# See: https://docs.percona.com/percona-operator-for-postgresql/latest/tls-cert-manager.html
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: harbor-postgres-tls
  namespace: {{ harbor_namespace }}
spec:
  secretName: harbor-postgres-tls
  issuerRef:
    name: ca-issuer
    kind: ClusterIssuer
  commonName: {{ harbor_postgres_cluster_name }}-pg-db-pgbouncer.{{ harbor_namespace }}.svc
  dnsNames:
    - {{ harbor_postgres_cluster_name }}-pg-db-pgbouncer
    - {{ harbor_postgres_cluster_name }}-pg-db-pgbouncer.{{ harbor_namespace }}
    - {{ harbor_postgres_cluster_name }}-pg-db-pgbouncer.{{ harbor_namespace }}.svc
    - {{ harbor_postgres_cluster_name }}-pg-db-pgbouncer.{{ harbor_namespace }}.svc.cluster.local
    - {{ harbor_postgres_cluster_name }}-pg-db-primary
    - {{ harbor_postgres_cluster_name }}-pg-db-primary.{{ harbor_namespace }}
    - {{ harbor_postgres_cluster_name }}-pg-db-primary.{{ harbor_namespace }}.svc
    - {{ harbor_postgres_cluster_name }}-pg-db-primary.{{ harbor_namespace }}.svc.cluster.local
    - "*.{{ harbor_postgres_cluster_name }}-pg-db-pods.{{ harbor_namespace }}.svc.cluster.local"
  usages:
    - server auth
    - client auth
