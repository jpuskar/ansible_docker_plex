---
apiVersion: v1alpha1
kind: VolumeConfig
name: STATE
encryption:
  provider: luks2
  keys:
{% if talos_use_tpm | default(true) %}
    - slot: 0
      tpm:
        checkSecurebootStatusOnEnroll: true
    - slot: 1
      static:
        passphrase: {{ talos_luks_passphrase }}
{% else %}
    - slot: 0
      static:
        passphrase: {{ talos_luks_passphrase }}
{% endif %}
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
encryption:
  provider: luks2
  keys:
{% if talos_use_tpm | default(true) %}
    - slot: 0
      tpm:
        checkSecurebootStatusOnEnroll: true
      lockToState: false
    - slot: 1
      static:
        passphrase: {{ talos_luks_passphrase }}
{% else %}
    - slot: 0
      static:
        passphrase: {{ talos_luks_passphrase }}
{% endif %}
