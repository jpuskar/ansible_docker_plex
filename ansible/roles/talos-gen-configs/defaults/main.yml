# Default image requirements (can be overridden per-host in host_vars)
talos_image_requirements:
  secureboot: true
  version: "v1.11.5"
  extensions: []

# Harbor registry configuration for Talos
# Enable this in later bootstrap phases after Harbor is deployed
talos_harbor_registry_enabled: false

# Harbor registry configuration (loaded from cluster vars when enabled)
# talos_harbor_registry_url: "https://harbor.example.com"
# talos_harbor_robot_username: "robot$talos-puller"
# talos_harbor_robot_password: "secret"
# talos_harbor_insecure_skip_verify: false
