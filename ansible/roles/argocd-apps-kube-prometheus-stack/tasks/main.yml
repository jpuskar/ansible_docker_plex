---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out Grafana admin StringSecret
  template:
    src: grafana-admin-stringsecret.yaml
    dest: "{{ output_dir_path }}/grafana-admin-stringsecret.yaml"

- name: Include kube-prometheus-stack tasks
  include_tasks: kube-prometheus-stack.yml
