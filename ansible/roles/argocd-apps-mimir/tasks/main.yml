---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out alertmanager fallback configmap
  template:
    src: alertmanager-fallback-configmap.yaml
    dest: "{{ output_dir_path }}/alertmanager-fallback-configmap.yaml"

- name: Include mimir tasks
  include_tasks: mimir.yml
