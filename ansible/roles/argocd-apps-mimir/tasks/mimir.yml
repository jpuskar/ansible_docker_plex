---
- name: Template out Mimir Helm values to temp dir
  template:
    src: mimir-helm-chart-values.yaml
    dest: "{{ temp_dir_path }}/mimir-values.yaml"

- name: Add grafana Helm repository
  shell:
    cmd: |-
      helm repo add grafana {{ mimir_chart_repo }}
  changed_when: false
  failed_when: false

- name: Update Helm grafana repositories
  shell:
    cmd: |-
      helm repo update grafana
  changed_when: false

- name: Generate Mimir manifests using helm template
  shell:
    cmd: |-
      helm template mimir grafana/{{ mimir_chart_name }} \
        --version {{ mimir_chart_version }} \
        --namespace {{ mimir_namespace }} \
        --values {{ temp_dir_path }}/mimir-values.yaml \
        --include-crds
  register: helm_template_command

- name: write output manifests for helm template
  copy:
    content: "{{ helm_template_command.stdout | harbor_rewrite_images(harbor_registry_map, harbor_proxy_images_enabled | default(false)) }}"
    dest: "{{ output_dir_path }}/mimir-helm-manifests.yaml"
