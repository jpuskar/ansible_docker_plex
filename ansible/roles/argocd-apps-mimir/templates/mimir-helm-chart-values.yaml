# Grafana Mimir Helm values — distributed (microservices) mode
# Each component runs as its own deployment/statefulset (1 replica each for homelab).
# Built-in MinIO for object storage. Includes ruler + alertmanager.

# --- Deployment mode: microservices (see all the pieces) ---
deploymentMode: microservices

mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: mimir-minio.{{ mimir_namespace }}.svc:9000
          access_key_id: "${MINIO_ROOT_USER}"
          secret_access_key: "${MINIO_ROOT_PASSWORD}"
          insecure: true
          bucket_name: mimir

    # Blocks storage (metrics TSDB blocks)
    blocks_storage:
      storage_prefix: blocks
      tsdb:
        dir: /data/tsdb

    # Compactor
    compactor:
      data_dir: /data/compactor

    # Ruler (evaluates alerting/recording rules)
    ruler:
      alertmanager_url: http://mimir-alertmanager.{{ mimir_namespace }}.svc:8080/alertmanager
      rule_path: /data/rules

    ruler_storage:
      storage_prefix: rules

    # Alertmanager
    alertmanager:
      data_dir: /data/alertmanager
      fallback_config_file: /etc/mimir/alertmanager-fallback.yaml

    alertmanager_storage:
      storage_prefix: alertmanager

    # Limits / retention
    limits:
      compactor_blocks_retention_period: {{ mimir_retention_period }}
      # Accept out-of-order samples (useful for scrapers with clock skew)
      out_of_order_time_window: 5m

    # Single-tenant mode (no X-Scope-OrgID header required)
    multitenancy_enabled: false

    server:
      log_level: warn

# --- Distributed component settings (1 replica each) ---
distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: {{ mimir_storage_size }}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

ruler:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 1Gi
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
  extraVolumes:
    - name: alertmanager-fallback
      configMap:
        name: mimir-alertmanager-fallback
  extraVolumeMounts:
    - name: alertmanager-fallback
      mountPath: /etc/mimir/alertmanager-fallback.yaml
      subPath: alertmanager.yaml
      readOnly: true

# --- Disable monolithic mode ---
monolithic:
  replicas: 0

# --- MinIO (built-in object storage for homelab) ---
minio:
  enabled: true
  replicas: 1
  persistence:
    size: {{ mimir_storage_size }}
    storageClass: openebs-rawfile
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi

# --- Nginx gateway (entry point for all reads/writes) ---
gateway:
  enabledNonEnterprise: true
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# --- Disable components not needed at homelab scale ---
rollout_operator:
  enabled: false

query_scheduler:
  enabled: false

overrides_exporter:
  enabled: false

# Caches — skip external memcached, use in-process caches
chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false
