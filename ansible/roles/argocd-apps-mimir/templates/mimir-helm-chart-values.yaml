---
# Grafana Mimir Helm values — distributed (microservices) mode
# Chart: mimir-distributed v6.0.6
# Each component runs as its own deployment/statefulset (1 replica each for homelab).
# Built-in MinIO for object storage. Includes ruler + alertmanager.

# --- Mimir config overrides (merged on top of chart's built-in config template) ---
mimir:
  structuredConfig:
    # Single-tenant mode (no X-Scope-OrgID header required)
    multitenancy_enabled: false

    # Disable Kafka ingest-storage (chart v6 enables it by default).
    # Classic write path: Alloy → distributor → ingester (direct gRPC).
    # Can add Kafka later for durability/replay if needed.
    ingest_storage:
      enabled: false
    ingester:
      push_grpc_method_enabled: true
      ring:
        replication_factor: 1

    # Limits / retention
    limits:
      compactor_blocks_retention_period: {{ mimir_retention_period }}
      # Accept out-of-order samples (useful for scrapers with clock skew)
      out_of_order_time_window: 5m
      # Series and ingestion limits (defaults are too low for a full k8s cluster)
      max_global_series_per_user: 500000
      ingestion_rate: 50000
      ingestion_burst_size: 500000

    server:
      log_level: warn

# --- Distributed component settings (1 replica each) ---
alertmanager:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 1Gi
  fallbackConfig: |
    global:
      resolve_timeout: 5m
    route:
      receiver: robusta
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            alertname: Watchdog
          receiver: "null"
        - match:
            alertname: InfoInhibitor
          receiver: "null"
    receivers:
      - name: "null"
      - name: robusta
        webhook_configs:
          - url: "http://robusta-runner.robusta.svc.cluster.local/api/alerts"
            send_resolved: true
  zoneAwareReplication:
    enabled: false

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

ingester:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: {{ mimir_storage_size }}
  zoneAwareReplication:
    enabled: false

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

query_scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

store_gateway:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 5Gi
  zoneAwareReplication:
    enabled: false

compactor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  persistentVolume:
    enabled: true
    storageClass: openebs-rawfile
    size: 10Gi

ruler:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

overrides_exporter:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# --- MinIO (built-in object storage for homelab) ---
minio:
  enabled: true
  mode: standalone
  persistence:
    size: {{ mimir_storage_size }}
    storageClass: openebs-rawfile
  resources:
    requests:
      cpu: 25m
      memory: 128Mi

# --- Kafka (ingest-storage) — not needed for homelab scale ---
kafka:
  enabled: false

# --- Nginx gateway (entry point for all reads/writes) ---
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# --- Rollout operator (manages statefulset rollouts) ---
rollout_operator:
  enabled: true

# --- Ruler querier/frontend/scheduler (dedicated ruler query path) ---
# Disable for homelab — ruler shares the main query path
ruler_querier:
  replicas: 0
ruler_query_frontend:
  replicas: 0
ruler_query_scheduler:
  replicas: 0

# --- Caches — skip external memcached, use in-process caches ---
chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false
