---
apiVersion: v1
kind: Service
metadata:
  name: smtp-proxy
  namespace: {{ shinobi_smtp_proxy_namespace }}
spec:
  selector:
    app: smtp-proxy
  ports:
    - name: smtp
      port: {{ shinobi_smtp_proxy_port }}
      targetPort: {{ shinobi_smtp_proxy_port }}
      protocol: TCP
  type: ClusterIP
