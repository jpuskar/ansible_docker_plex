---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smtp-proxy-grafana-dashboard
  namespace: {{ shinobi_smtp_proxy_namespace }}
  labels:
    grafana_dashboard: "1"
data:
  smtp-proxy.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Inference Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(smtp_proxy_inference_duration_seconds_bucket{priority=\"motion\"}[$__rate_interval])) by (le))",
              "legendFormat": "motion p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(smtp_proxy_inference_duration_seconds_bucket{priority=\"motion\"}[$__rate_interval])) by (le))",
              "legendFormat": "motion p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(smtp_proxy_inference_duration_seconds_bucket{priority=\"motion\"}[$__rate_interval])) by (le))",
              "legendFormat": "motion p99"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(smtp_proxy_inference_duration_seconds_bucket{priority=\"baseline\"}[$__rate_interval])) by (le))",
              "legendFormat": "baseline p50"
            }
          ]
        },
        {
          "title": "Inference Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(smtp_proxy_inference_total{priority=\"motion\"}[$__rate_interval]))",
              "legendFormat": "motion"
            },
            {
              "expr": "sum(rate(smtp_proxy_inference_total{priority=\"baseline\"}[$__rate_interval]))",
              "legendFormat": "baseline"
            }
          ]
        },
        {
          "title": "Queue Depth & Preemptions",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "smtp_proxy_inference_queue_depth",
              "legendFormat": "queue depth"
            },
            {
              "expr": "rate(smtp_proxy_inference_preemptions_total[$__rate_interval])",
              "legendFormat": "preemptions/s"
            }
          ]
        },
        {
          "title": "Alerts Sent",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          },
          "targets": [
            {
              "expr": "increase(smtp_proxy_alerts_total[$__rate_interval])",
              "legendFormat": "{% raw %}{{ camera }} ({{ destination }}){% endraw %}"
            }
          ]
        },
        {
          "title": "Detections by Class",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          },
          "targets": [
            {
              "expr": "sum by (class_name) (rate(smtp_proxy_detections_total[$__rate_interval]))",
              "legendFormat": "{% raw %}{{ class_name }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Motion Events by Camera",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "custom": { "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          },
          "targets": [
            {
              "expr": "rate(smtp_proxy_motion_events_total[$__rate_interval])",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Motion Filter Reasons",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sum by (reason) (increase(smtp_proxy_motion_filtered_total[1h]))",
              "legendFormat": "{% raw %}{{ reason }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Camera Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": { "steps": [{ "value": null, "color": "red" }, { "value": 1, "color": "green" }] }
            }
          },
          "targets": [
            {
              "expr": "smtp_proxy_camera_connected",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Baseline Objects",
          "type": "stat",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "smtp_proxy_baseline_objects",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Frame Rate by Camera",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "fps",
              "custom": { "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "rate(smtp_proxy_camera_frames_total{status=\"ok\"}[$__rate_interval])",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Bandwidth by Camera",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "fillOpacity": 10 }
            }
          },
          "targets": [
            {
              "expr": "rate(smtp_proxy_camera_bytes_total[$__rate_interval])",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Baseline Skips (motion active)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "rate(smtp_proxy_baseline_skipped_total[$__rate_interval])",
              "legendFormat": "{% raw %}{{ camera }}{% endraw %}"
            }
          ]
        },
        {
          "title": "Model Info",
          "type": "stat",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "blue" } } },
          "targets": [
            {
              "expr": "smtp_proxy_model_info",
              "legendFormat": "{% raw %}{{ model }} on {{ device }}{% endraw %}"
            }
          ],
          "options": { "textMode": "name" }
        }
      ],
      "schemaVersion": 39,
      "tags": ["cameras", "yolo", "openvino"],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "selected": true, "text": "Prometheus", "value": "prometheus" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Camera Detection System",
      "uid": "smtp-proxy-cameras"
    }
