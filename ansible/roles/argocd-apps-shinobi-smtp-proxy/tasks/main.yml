---
- name: Template out namespace manifest
  template:
    src: namespace.yaml
    dest: "{{ output_dir_path }}/namespace.yaml"

- name: Template out smtp-proxy configmap
  template:
    src: smtp-proxy-configmap.yaml
    dest: "{{ output_dir_path }}/smtp-proxy-configmap.yaml"

- name: Template out smtp-proxy camera credentials secret
  template:
    src: smtp-proxy-secret.yaml
    dest: "{{ output_dir_path }}/smtp-proxy-secret.yaml"

- name: Template out smtp-proxy service
  template:
    src: smtp-proxy-service.yaml
    dest: "{{ output_dir_path }}/smtp-proxy-service.yaml"

- name: Template out smtp-proxy statefulset
  template:
    src: smtp-proxy-statefulset.yaml
    dest: "{{ output_dir_path }}/smtp-proxy-statefulset.yaml"
