---
# shinobi-smtp-proxy ArgoCD Application Role Defaults

# Namespace
shinobi_smtp_proxy_namespace: "shinobi"

# Container image
shinobi_smtp_proxy_image: "{{ harbor_external_url }}/library/shinobi-smtp-proxy:latest"

# SMTP port
shinobi_smtp_proxy_port: 2525

# Health check port
shinobi_smtp_proxy_health_port: 8080

# Resource requests/limits
shinobi_smtp_proxy_resources_requests_memory: "512Mi"
shinobi_smtp_proxy_resources_requests_cpu: "250m"
shinobi_smtp_proxy_resources_limits_memory: "2Gi"
shinobi_smtp_proxy_resources_limits_cpu: "1000m"

# LoadBalancer IP (Cilium LB-IPAM) — shinobi-smtp-proxy.spaceskippy.net
shinobi_smtp_proxy_loadbalancer_ip: !vault |
  $ANSIBLE_VAULT;1.1;AES256
  63633130326433393962623062623431383435366333306335643364623666333231623936316563
  6132336530396638363632393762633036336436373165660a333732363935316162616631663463
  32333030633934316162373736373035353066393532376333643833653565306430363361336631
  6233633134313762380a643966323464303866323737633461356432653136373933336164656237
  3663

# Baseline detection
shinobi_smtp_proxy_baseline_interval: 60
shinobi_smtp_proxy_position_tolerance: 0.15

# Rolling snapshot buffer
shinobi_smtp_proxy_snapshot_interval: 1
shinobi_smtp_proxy_buffer_seconds: 10

# Camera credentials (vault encrypted)
shinobi_smtp_proxy_camera_username: "CHANGEME_VAULT_ENCRYPT"
shinobi_smtp_proxy_camera_password: "CHANGEME_VAULT_ENCRYPT"

# Camera IPs keyed by email sender prefix
# e.g. camnorthtoeast@spaceskippy.net -> camnorthtoeast -> 192.168.x.x
shinobi_smtp_proxy_cameras:
  camnorthtoeast: "CHANGEME_VAULT_ENCRYPT"
  camnorthtowest: "CHANGEME_VAULT_ENCRYPT"
  camwesttosouth: "CHANGEME_VAULT_ENCRYPT"
  camwesttonorth: "CHANGEME_VAULT_ENCRYPT"
  camfrontsoutheast: "CHANGEME_VAULT_ENCRYPT"
  campatiodoor: "CHANGEME_VAULT_ENCRYPT"
