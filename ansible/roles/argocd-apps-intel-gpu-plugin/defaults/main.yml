---
# Intel GPU Device Plugin ArgoCD Application Role Defaults

intel_gpu_namespace: "intel-gpu-plugin"

# Plugin image
intel_gpu_plugin_image: "intel/intel-gpu-plugin:0.35.0"

# Number of containers that can share a single GPU
# 1 = exclusive access, >1 = time-sliced sharing
intel_gpu_shared_dev_num: 10

# Log verbosity (0-5, higher = more verbose)
intel_gpu_log_level: 2

# Enable GPU monitoring metrics
intel_gpu_enable_monitoring: true
