---
# Harbor Pull-Through Cache Project Role Defaults

# List of upstream registries to configure as pull-through cache
# Each entry creates a proxy cache project in Harbor
harbor_pull_through_registries:
  - name: dockerhub
    display_name: "Docker Hub Proxy"
    endpoint_url: "https://registry-1.docker.io"
    endpoint_name: "Docker Hub"
    # For Docker Hub, use your Docker Hub credentials to avoid rate limits
    # username: "your-dockerhub-username"
    # password: "your-dockerhub-token"
    verify_remote_cert: true

  - name: ghcr
    display_name: "GitHub Container Registry Proxy"
    endpoint_url: "https://ghcr.io"
    endpoint_name: "GHCR"
    # No credentials needed for public GHCR images
    verify_remote_cert: true

  - name: quay
    display_name: "Quay.io Proxy"
    endpoint_url: "https://quay.io"
    endpoint_name: "Quay"
    verify_remote_cert: true

  - name: gcr
    display_name: "Google Container Registry Proxy"
    endpoint_url: "https://gcr.io"
    endpoint_name: "GCR"
    verify_remote_cert: true

  - name: k8sgcr
    display_name: "Kubernetes GCR Proxy"
    endpoint_url: "https://k8s.gcr.io"
    endpoint_name: "K8s GCR"
    verify_remote_cert: true

  - name: registryk8s
    display_name: "Registry K8s Proxy"
    endpoint_url: "https://registry.k8s.io"
    endpoint_name: "Registry K8s"
    verify_remote_cert: true

# Harbor admin credentials (pulled from K8s secret by default)
# harbor_admin_password: "Harbor12345"

# Harbor external URL (should be set in cluster vars)
# harbor_external_url: "https://harbor.example.com"

# Validate TLS certificates
harbor_validate_certs: false
