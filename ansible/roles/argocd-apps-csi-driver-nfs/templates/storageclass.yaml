---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ csi_driver_nfs_storageclass_name }}
{% if csi_driver_nfs_storageclass_is_default %}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
{% endif %}
provisioner: nfs.csi.k8s.io
reclaimPolicy: {{ csi_driver_nfs_reclaim_policy }}
volumeBindingMode: Immediate
allowVolumeExpansion: true
parameters:
  server: {{ csi_driver_nfs_server }}
  share: {{ csi_driver_nfs_share }}
mountOptions:
{% for opt in csi_driver_nfs_mount_options %}
  - {{ opt }}
{% endfor %}
