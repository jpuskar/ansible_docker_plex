---
# VLAN and Routing Configuration using puzzle.opnsense collection

# ============================================
# VLAN Configuration
# ============================================

- name: Configure VLANs
  puzzle.opnsense.vlan:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    interface: "{{ item.device }}"
    vlan_tag: "{{ item.tag }}"
    description: "{{ item.description }}"
    priority: "{{ item.priority | default(0) }}"
    state: present
  loop: "{{ opnsense_vlans }}"
  when:
    - opnsense_vlans is defined
    - opnsense_configure_vlans | default(true)
  loop_control:
    label: "{{ item.device }}.{{ item.tag }}"

# ============================================
# Static Routes Configuration
# ============================================

- name: Configure static routes
  puzzle.opnsense.route_static:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    network: "{{ item.network }}"
    gateway: "{{ item.gateway }}"
    description: "{{ item.descr | default('') }}"
    state: present
  loop: "{{ opnsense_routes }}"
  when:
    - opnsense_routes is defined
    - opnsense_configure_routes | default(true)
  loop_control:
    label: "{{ item.network }}"
