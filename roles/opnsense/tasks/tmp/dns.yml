---
# DNS (Unbound) Configuration using puzzle.opnsense collection

# ============================================
# DNS Host Overrides
# ============================================

- name: Configure DNS host overrides
  puzzle.opnsense.unbound_host:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    hostname: "{{ item.hostname }}"
    domain: "{{ item.domain }}"
    rr: "A"
    server: "{{ item.ip }}"
    description: "{{ item.descr | default('') }}"
    state: present
  loop: "{{ opnsense_dns_hosts }}"
  when: opnsense_dns_hosts is defined
  loop_control:
    label: "{{ item.hostname }}.{{ item.domain }}"

# ============================================
# DNS Domain Overrides (Forward Zones)
# ============================================

- name: Configure DNS domain overrides
  puzzle.opnsense.unbound_domain:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    domain: "{{ item.domain }}"
    server: "{{ item.server }}"
    description: "{{ item.descr | default('') }}"
    state: present
  loop: "{{ opnsense_dns_domains }}"
  when: opnsense_dns_domains is defined
  loop_control:
    label: "{{ item.domain }}"

# ============================================
# Unbound General Settings
# ============================================

- name: Configure Unbound general settings
  puzzle.opnsense.unbound_general:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    enabled: "{{ opnsense_unbound_settings.enable | default(true) }}"
    port: "{{ opnsense_unbound_settings.port | default(53) }}"
    dnssec: "{{ opnsense_unbound_settings.dnssec | default(false) }}"
    forwarding: "{{ opnsense_unbound_settings.forwarding | default(false) }}"
    regdhcp: "{{ opnsense_unbound_settings.regdhcp | default(true) }}"
    regdhcpstatic: "{{ opnsense_unbound_settings.regdhcpstatic | default(true) }}"
  when: opnsense_unbound_settings is defined
