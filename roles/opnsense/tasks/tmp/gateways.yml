---
# Gateway Configuration using puzzle.opnsense collection

- name: Configure gateways
  puzzle.opnsense.system_gateway:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    name: "{{ item.name }}"
    interface: "{{ item.interface }}"
    ipprotocol: "{{ item.ipprotocol | default('inet') }}"
    gateway: "{{ item.gateway }}"
    monitor: "{{ item.monitor | default(omit) }}"
    description: "{{ item.descr | default('') }}"
    default_gateway: "{{ item.defaultgw | default(false) }}"
    disabled: "{{ item.disabled | default(false) }}"
    monitor_disable: "{{ item.monitor_disable | default(false) }}"
    state: present
  loop: "{{ opnsense_gateways }}"
  when: opnsense_gateways is defined
  loop_control:
    label: "{{ item.name }}"

- name: Configure gateway groups
  puzzle.opnsense.system_gateway_group:
    api_url: "{{ opnsense_url }}"
    api_key: "{{ opnsense_api_key }}"
    api_secret: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_validate_certs }}"
    name: "{{ item.name }}"
    trigger: "{{ item.trigger | default('down') }}"
    description: "{{ item.descr | default('') }}"
    members: "{{ item.members }}"
    state: present
  loop: "{{ opnsense_gateway_groups }}"
  when: opnsense_gateway_groups is defined
  loop_control:
    label: "{{ item.name }}"
