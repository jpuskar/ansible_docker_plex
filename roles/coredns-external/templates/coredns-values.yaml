---
# Service type
serviceType: LoadBalancer

# Service configuration
service:
  loadBalancerIP: {{ coredns_external_loadbalancer_ip }}
  annotations:
    io.cilium/lb-ipam-ips: "{{ coredns_external_loadbalancer_ip }}"

# Service account for kubernetes API access
serviceAccount:
  create: true

# RBAC for k8s_external plugin
rbac:
  create: true

# CoreDNS configuration with k8s_external plugin
servers:
  - zones:
      - zone: .
    port: 53
    plugins:
      - name: errors
      - name: health
        configBlock: |-
          lameduck 5s
      - name: ready
      - name: kubernetes
        parameters: cluster.local
      - name: k8s_external
        parameters: {{ coredns_external_dns_domain }}
        configBlock: |-
          apex dns
          ttl 30
          fallthrough
      - name: prometheus
        parameters: 0.0.0.0:9153
      - name: forward
        parameters: . /etc/resolv.conf
      - name: cache
        parameters: 30
      - name: loop
      - name: reload
      - name: loadbalance

# Resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Replicas
replicaCount: 2

# Tolerations
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
