---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ openebs_rawfile_storageclass_name }}
{% if openebs_rawfile_storageclass_is_default %}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
{% endif %}
provisioner: rawfile.csi.openebs.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  # Filesystem type
  fsType: {{ openebs_rawfile_filesystem }}

# Only provision volumes on nodes with TPM encryption
allowedTopologies:
- matchLabelExpressions:
  - key: encryption.talos.dev/tpm
    values:
    - "true"
