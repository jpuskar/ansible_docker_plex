---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Multi-source: Helm chart from Helm repo, values and namespace from Git
  sources:
    # Helm chart source
    - repoURL: https://helm.goharbor.io
      chart: harbor
      targetRevision: 1.16.1
      helm:
        valueFiles:
          - $values/argocd-apps/harbor/harbor-values.yaml

    # Git repo source for values
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: zfs-disk-replace
      ref: values

    # Git repo source for namespace
    - repoURL: https://github.com/jpuskar/ansible_docker_plex
      targetRevision: zfs-disk-replace
      path: argocd-apps/harbor
      directory:
        include: 'namespace.yaml'

  destination:
    server: https://kubernetes.default.svc
    namespace: harbor

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
