---
# Ansible playbook for ArgoCD CMP plugin
# This playbook renders Harbor manifests with domain substitution
# ArgoCD will run this playbook to generate manifests

- name: Generate Harbor manifests with domain substitution
  hosts: localhost
  connection: local
  gather_facts: no

  vars_files:
    - vars.yml  # Contains cluster_domain (vault-encrypted)

  vars:
    harbor_chart_repo: "https://helm.goharbor.io"
    harbor_chart_name: "harbor"
    harbor_chart_version: "1.16.1"
    harbor_namespace: "harbor"

  tasks:
    - name: Validate cluster_domain is set
      assert:
        that:
          - cluster_domain is defined
          - cluster_domain | length > 0
        fail_msg: "cluster_domain must be defined in vars.yml"

    - name: Read harbor-values.yaml template
      slurp:
        src: harbor-values.yaml
      register: harbor_values_content

    - name: Render harbor-values.yaml with actual domain
      copy:
        content: "{{ (harbor_values_content.content | b64decode) | replace('MY_DOMAIN', cluster_domain) }}"
        dest: "/tmp/harbor-values-rendered.yaml"

    - name: Add Harbor Helm repository
      command: helm repo add harbor {{ harbor_chart_repo }}
      changed_when: false
      failed_when: false

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Generate Harbor manifests using helm template
      shell: |
        helm template {{ harbor_chart_name }} harbor/{{ harbor_chart_name }} \
          --version {{ harbor_chart_version }} \
          --namespace {{ harbor_namespace }} \
          --values /tmp/harbor-values-rendered.yaml \
          --include-crds > {{ argocd_output_dir }}/harbor-helm-manifests.yaml
      args:
        creates: "{{ argocd_output_dir }}/harbor-helm-manifests.yaml"

    - name: Read harbor-external-ingress.yaml template
      slurp:
        src: harbor-external-ingress.yaml
      register: harbor_ingress_content

    - name: Render harbor-external-ingress.yaml with actual domain
      copy:
        content: "{{ (harbor_ingress_content.content | b64decode) | replace('MY_DOMAIN', cluster_domain) }}"
        dest: "{{ argocd_output_dir }}/harbor-external-ingress.yaml"

    - name: Copy other manifests as-is
      copy:
        src: "{{ item }}"
        dest: "{{ argocd_output_dir }}/{{ item }}"
      loop:
        - namespace.yaml
        - redis-standalone.yaml
        - postgres-values.yaml
        - postgres-tls-certificate.yaml
