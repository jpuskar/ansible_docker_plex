---
# Percona PostgreSQL Cluster for Harbor

# Cluster name
crName: harbor-postgres

# PostgreSQL instances configuration
instances:
  - name: instance1
    replicas: 2  # HA with 2 replicas for Harbor

    # Storage configuration using OpenEBS Rawfile
    dataVolumeClaimSpec:
      storageClassName: openebs-rawfile
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

    # Affinity rules: require TPM nodes and spread across nodes
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: encryption.talos.dev/tpm
                  operator: In
                  values:
                    - "true"
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/cluster: harbor-postgres-pg-db
                postgres-operator.crunchydata.com/instance-set: instance1

# pgBouncer connection pooler
proxy:
  pgBouncer:
    replicas: 2

    # Affinity rules: require TPM nodes and spread across nodes
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: encryption.talos.dev/tpm
                  operator: In
                  values:
                    - "true"
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                postgres-operator.crunchydata.com/cluster: harbor-postgres-pg-db
                postgres-operator.crunchydata.com/role: pgbouncer

# Disable backups
backups:
  enabled: false

# TLS configuration using cert-manager certificate
customRootCATLSSecret:
  name: harbor-postgres-tls

# PostgreSQL configuration
postgresVersion: 17

# Create Harbor user and database
users:
  - name: harbor
    databases:
      - registry
    grantPublicSchemaAccess: true
    options: "LOGIN"
    password:
      type: ASCII

# Custom PostgreSQL configuration for Harbor
patroni:
  dynamicConfiguration:
    postgresql:
      parameters:
        max_connections: 100
        shared_buffers: 128MB
