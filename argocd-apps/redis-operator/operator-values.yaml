---
# OT Redis Operator Helm values

# Operator replica count
replicaCount: 1

# Allow scheduling on control plane nodes
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Resource limits for operator
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# RBAC configuration
rbac:
  create: true

serviceAccount:
  create: true
  name: redis-operator

# Watch all namespaces for Redis resources
watchNamespace: ""

# Metrics endpoint
redisOperator:
  enableMetrics: true
